<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清寒Zeep</title>
    <style>
        :root {
            --primary-color: #00c6c3;
            --primary-light: #e0f7f7;
            --primary-dark: #009a97;
            --primary-glow: rgba(0, 198, 195, 0.5);
            --bg-color: #f7fdfd;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #cce7e7;
            --shadow: 0 4px 20px rgba(0, 198, 195, 0.2);
            --shadow-hover: 0 8px 30px rgba(0, 198, 195, 0.35);
            --radius: 16px;
            --slider-radius: 20px;
            --gradient-1: linear-gradient(135deg, rgba(0, 198, 195, 0.15) 0%, rgba(0, 230, 255, 0.08) 100%);
            --gradient-2: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        }

        .dark-theme {
            --primary-color: #00e5e0;
            --primary-light: #003f3e;
            --primary-dark: #00b3b0;
            --primary-glow: rgba(0, 229, 224, 0.6);
            --bg-color: #0a1a1a;
            --card-bg: #0f2a2a;
            --text-color: #e2f7f7;
            --border-color: #1a4a4a;
            --shadow: 0 4px 20px rgba(0, 198, 195, 0.3);
            --shadow-hover: 0 8px 30px rgba(0, 198, 195, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 198, 195, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 230, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 154, 151, 0.15) 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-color) 0%, rgba(0, 198, 195, 0.05) 100%);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            padding-top: 10px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: expandWidth 1s ease-out;
        }

        @keyframes expandWidth {
            from {
                width: 0;
            }
            to {
                width: 120px;
            }
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 12px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 198, 195, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 2px 8px rgba(0, 198, 195, 0.2);
            }
            50% {
                text-shadow: 0 2px 20px rgba(0, 198, 195, 0.4);
            }
        }

        .subtitle {
            color: #5d7c8c;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
            transition: color 0.3s;
        }

        .dark-theme .subtitle {
            color: #a3d1d1;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: var(--radius);
            padding: 35px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s, backdrop-filter 0.3s;
            animation: slideUp 0.6s ease-out;
        }

        .dark-theme .card {
            background: rgba(15, 42, 42, 0.75);
            border-color: rgba(0, 198, 195, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), #00e6ff, var(--primary-color));
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: -200% center;
            }
            50% {
                background-position: 200% center;
            }
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 16px;
            color: var(--text-color);
            transition: color 0.3s;
        }

        label:hover {
            color: var(--primary-color);
        }

        input, select {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            color: var(--text-color);
            transition: all 0.3s;
        }

        .dark-theme input, .dark-theme select {
            background: rgba(15, 42, 42, 0.5);
        }

        input:hover, select:hover {
            border-color: var(--primary-dark);
            background: rgba(255, 255, 255, 0.65);
        }

        .dark-theme input:hover, .dark-theme select:hover {
            background: rgba(15, 42, 42, 0.65);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 198, 195, 0.25), 0 4px 12px rgba(0, 198, 195, 0.15);
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
        }

        .dark-theme input:focus, .dark-theme select:focus {
            background: rgba(15, 42, 42, 0.75);
        }

        input::placeholder {
            color: #a0aec0;
            transition: color 0.3s;
        }

        .dark-theme input::placeholder {
            color: #718096;
        }

        input:focus::placeholder {
            color: var(--primary-color);
        }

        .steps-control {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        /* 滑块轨道 - 圆角矩形 */
        #steps-range {
            flex: 1;
            height: 20px;
            border-radius: var(--slider-radius);
            background: rgba(224, 240, 240, 0.5);
            backdrop-filter: blur(8px) saturate(180%);
            -webkit-backdrop-filter: blur(8px) saturate(180%);
            outline: none;
            -webkit-appearance: none;
            border: 2px solid rgba(184, 224, 224, 0.9);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .dark-theme #steps-range {
            background: rgba(26, 74, 74, 0.5);
            border-color: rgba(42, 106, 106, 0.9);
        }

        /* 滑块进度填充 */
        #steps-range::-webkit-slider-runnable-track {
            width: 100%;
            height: 100%;
            border-radius: var(--slider-radius);
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            position: relative;
        }

        /* 滑块拇指 */
        #steps-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--primary-color);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin-top: -8px;
            transition: all 0.2s;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 10px rgba(0, 198, 195, 0.3);
            }
            50% {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 198, 195, 0.6);
            }
        }

        #steps-range::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 3px 12px rgba(0, 198, 195, 0.5);
        }

        /* Firefox 滑块样式 */
        #steps-range::-moz-range-track {
            width: 100%;
            height: 100%;
            border-radius: var(--slider-radius);
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        }

        #steps-range::-moz-range-thumb {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--primary-color);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* 步数输入框 */
        #steps {
            width: 130px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border: 2px solid var(--primary-color);
            background: rgba(0, 198, 195, 0.1);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
        }

        #steps:hover {
            border-color: var(--primary-dark);
            box-shadow: 0 0 15px rgba(0, 198, 195, 0.4);
            background: rgba(0, 198, 195, 0.15);
        }

        .steps-display {
            text-align: center;
            padding: 30px;
            margin: 25px 0;
            background: linear-gradient(135deg, rgba(0, 198, 195, 0.2) 0%, rgba(0, 230, 255, 0.1) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: var(--radius);
            border: 1px solid rgba(0, 198, 195, 0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s, backdrop-filter 0.3s;
        }

        .steps-display:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 198, 195, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
        }

        .steps-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        /* 步数显示 - 添加斜体样式 */
        #steps-value-display {
            font-size: 52px;
            font-weight: 800;
            color: var(--primary-color);
            text-shadow: 0 2px 8px rgba(0, 198, 195, 0.25);
            margin-bottom: 5px;
            font-style: italic;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            letter-spacing: 1px;
            transform: skew(-5deg);
            display: inline-block;
            padding: 0 5px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: skew(-5deg) translateY(0);
            }
            50% {
                transform: skew(-5deg) translateY(-5px);
            }
        }

        .steps-display p {
            font-size: 15px;
            color: #5d7c8c;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: color 0.3s;
        }

        .dark-theme .steps-display p {
            color: #a3d1d1;
        }

        .password-group {
            position: relative;
        }

        #togglePassword {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 198, 195, 0.2);
            backdrop-filter: blur(8px) saturate(180%);
            -webkit-backdrop-filter: blur(8px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            transition: all 0.3s;
        }

        #togglePassword:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 198, 195, 0.4);
            transform: translateY(-50%) scale(1.05);
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 35px;
        }

        button {
            padding: 17px 35px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #submit-btn {
            flex: 2;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 198, 195, 0.3);
            position: relative;
            overflow: hidden;
        }

        #submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        #submit-btn:hover::before {
            left: 100%;
        }

        #submit-btn:hover {
            background: linear-gradient(135deg, var(--primary-dark), #008a87);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 198, 195, 0.4);
        }

        #submit-btn:active {
            transform: translateY(-1px);
        }

        #submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #theme-toggle {
            flex: 1;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .dark-theme #theme-toggle {
            background: rgba(15, 42, 42, 0.65);
        }

        #theme-toggle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 198, 195, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        #theme-toggle:hover::before {
            width: 300px;
            height: 300px;
        }

        #theme-toggle:hover {
            background: rgba(224, 247, 247, 0.85);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 198, 195, 0.3);
        }

        .dark-theme #theme-toggle:hover {
            background: rgba(0, 63, 62, 0.85);
        }

        #theme-toggle span {
            position: relative;
            z-index: 1;
        }

        .status-container {
            margin-top: 30px;
            padding: 25px;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            min-height: 90px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .dark-theme .status-container {
            background: rgba(15, 42, 42, 0.7);
            border-color: rgba(0, 198, 195, 0.25);
        }

        .status-container:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
        }

        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
        }

        .status-title::before {
            content: '⦿';
            color: var(--primary-color);
            font-size: 12px;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.2);
            }
        }

        #status-text {
            font-size: 16px;
            line-height: 1.6;
            padding: 5px 0;
            transition: all 0.3s;
        }

        .status-pending {
            color: #ffb300;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .status-success {
            color: var(--primary-color);
            animation: success-pulse 0.5s ease-out;
        }

        @keyframes success-pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .status-error {
            color: #ff5252;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            padding-bottom: 15px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: #5d7c8c;
            transition: color 0.3s;
        }

        .dark-theme footer {
            color: #a3d1d1;
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .step-indicators {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #7a9cad;
        }

        .step-indicators span {
            position: relative;
            padding: 0 5px;
            transition: color 0.3s;
        }

        .step-indicators span:hover {
            color: var(--primary-color);
        }

        .dark-theme .step-indicators {
            color: #8abfbf;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .steps-control {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            
            #steps {
                width: 100%;
            }
            
            #steps-value-display {
                font-size: 44px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .step-indicators {
                font-size: 12px;
            }
        }

        /* 添加一些青色主题的装饰元素 */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            animation: float-decoration 12s ease-in-out infinite;
        }

        @keyframes float-decoration {
            0%, 100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            50% {
                transform: translateY(-30px) rotate(8deg) scale(1.05);
            }
        }

        .decoration-1 {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 198, 195, 0.2) 0%, rgba(0, 198, 195, 0.05) 40%, transparent 70%);
            top: -200px;
            right: -200px;
            filter: blur(40px);
            animation-delay: 0s;
        }

        .decoration-2 {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 230, 255, 0.15) 0%, rgba(0, 230, 255, 0.03) 45%, transparent 70%);
            bottom: -150px;
            left: -150px;
            filter: blur(35px);
            animation-delay: 3s;
        }

        .decoration-3 {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 198, 195, 0.12) 0%, rgba(0, 198, 195, 0.02) 50%, transparent 70%);
            top: 40%;
            left: -125px;
            filter: blur(30px);
            animation-delay: 6s;
        }

        .decoration-4 {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 154, 151, 0.1) 0%, transparent 70%);
            top: 20%;
            right: 10%;
            filter: blur(25px);
            animation-delay: 9s;
        }
        
        /* 斜体数字装饰效果 */
        .italic-decoration {
            position: absolute;
            font-size: 30px;
            color: rgba(0, 198, 195, 0.1);
            font-style: italic;
            font-weight: 900;
            z-index: -1;
            user-select: none;
            animation: drift 8s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-10px) translateX(5px);
            }
            75% {
                transform: translateY(10px) translateX(-5px);
            }
        }

        /* 添加加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 添加成功图标动画 */
        .success-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            position: relative;
            margin-right: 8px;
            animation: pop 0.5s ease-out;
        }

        .success-icon::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>
    <div class="decoration decoration-4"></div>
    
    <div class="container">
        <header>
            <h1>清寒のZeep站</h1>
            <p class="subtitle">轻松修改微信运动/支付宝步数，个性化设置每日目标</p>
            <p class="subtitle">本站为个人个用，不存储账号密码</p>
        </header>
        
        <main>
            <div class="card">
                <form id="step-form">
                    <div class="form-group">
                        <label for="account">账号</label>
                        <input type="email" id="account" placeholder="请输入您的邮箱账号" value="" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="password-group">
                            <input type="password" id="password" placeholder="请输入密码" value="" required>
                            <button type="button" id="togglePassword">显示密码</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="steps">目标步数</label>
                        <div class="steps-control">
                            <input type="range" id="steps-range" min="0" max="100000" step="100" value="52100">
                            <input type="number" id="steps" min="0" max="100000" step="100" value="52100">
                        </div>
                        
                        <div class="step-indicators">
                            <span>0</span>
                            <span>25,000</span>
                            <span>50,000</span>
                            <span>75,000</span>
                            <span>100,000</span>
                        </div>
                    </div>
                    
                    <div class="steps-display">
                        <div id="steps-value-display">52,100</div>
                        <p>今日目标步数</p>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" id="submit-btn">
                            <span>提交步数</span>
                        </button>
                        <button type="button" id="theme-toggle">
                            <span>深色模式</span>
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="status-container">
                <div class="status-title">提交状态</div>
                <div id="status-text">准备就绪，请输入步数并提交</div>
            </div>
        </main>
        
        <footer>
            <p>© 2026 清寒Zeep | 💗LoveHQ | 仅供学习交流使用 <a href="https://icp.gov.moe/?keyword=20265210" target="_blank">萌ICP备20265210号</a></p>
            <p>注意：请合理使用，避免频繁提交导致账号异常</p>
            
        </footer>
    </div>

    <script>
        // 常量定义
        const API_URL = 'http://jm667bl23625.vicp.fun';
        
        // DOM元素
        const stepsInput = document.getElementById('steps');
        const stepsRange = document.getElementById('steps-range');
        const stepsValueDisplay = document.getElementById('steps-value-display');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const apiStatus = document.getElementById('status-text');
        const accountInput = document.getElementById('account');
        const submitBtn = document.getElementById('submit-btn');
        
        // 格式化数字显示
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        // 更新步数显示
        function updateStepsDisplay() {
            const steps = stepsInput.value;
            stepsValueDisplay.textContent = formatNumber(steps);
            
            // 动态更新滑块背景
            const percentage = (steps / 100000) * 100;
            stepsRange.style.background = `linear-gradient(90deg, var(--primary-color) 0%, var(--primary-dark) ${percentage}%, #e0f0f0 ${percentage}%, #e0f0f0 100%)`;
            
            // 为斜体数字添加动态效果
            stepsValueDisplay.style.transform = `skew(-5deg) scale(1.02)`;
            setTimeout(() => {
                stepsValueDisplay.style.transform = `skew(-5deg) scale(1)`;
            }, 150);
        }
        
        // 步数滑块和输入框同步
        stepsRange.addEventListener('input', function() {
            stepsInput.value = this.value;
            updateStepsDisplay();
        });
        
        stepsInput.addEventListener('input', function() {
            // 限制最大值
            if (parseInt(this.value) > 100000) {
                this.value = 100000;
            }
            
            // 限制最小值
            if (parseInt(this.value) < 0) {
                this.value = 0;
            }
            
            // 同步滑块
            stepsRange.value = this.value;
            updateStepsDisplay();
        });
        
        // 显示/隐藏密码功能
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '显示密码' : '隐藏密码';
        });
        
        // 主题切换功能
        themeToggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            this.innerHTML = isDark ? '<span>浅色模式</span>' : '<span>深色模式</span>';
            
            // 保存主题偏好到本地存储
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // 更新滑块背景
            updateStepsDisplay();
        });
        
        // 检查本地存储的主题偏好
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggleBtn.innerHTML = '<span>浅色模式</span>';
        }
        
        // 提交API请求
        async function submitSteps(event) {
            event.preventDefault();
            
            // 获取表单数据
            const account = accountInput.value.trim();
            const password = passwordInput.value.trim();
            const steps = stepsInput.value;
            
            // 验证输入
            if (!account || !password || !steps) {
                apiStatus.textContent = '错误：请填写所有字段';
                apiStatus.className = 'status-error';
                return;
            }
            
            if (steps < 0 || steps > 100000) {
                apiStatus.textContent = '错误：步数必须在0-100000之间';
                apiStatus.className = 'status-error';
                return;
            }
            
            // 更新状态
            apiStatus.textContent = '正在提交步数，请稍候...';
            apiStatus.className = 'status-pending';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>提交中...</span>';
            
            try {
                // 构建请求URL - 使用zeep api的路径参数格式
                const encodedAccount = encodeURIComponent(account);
                const encodedPassword = encodeURIComponent(password);
                const url = `${API_URL}/${encodedAccount}/${encodedPassword}/${steps}`;
                
                // 显示请求URL（调试用）
                console.log('请求URL:', url);
                
                // 发送请求
                const response = await fetch(url);
                
                // 处理响应
                if (response.ok) {
                    const result = await response.json();
                    
                    if (result.success) {
                        apiStatus.textContent = `提交成功！步数已更新为 ${formatNumber(steps)} 步`;
                        apiStatus.className = 'status-success';
                        
                        // 添加成功动画效果 - 增强斜体数字效果
                        stepsValueDisplay.style.transform = 'skew(-5deg) scale(1.15)';
                        stepsValueDisplay.style.color = '#00fffb';
                        setTimeout(() => {
                            stepsValueDisplay.style.transform = 'skew(-5deg) scale(1)';
                            stepsValueDisplay.style.color = '';
                        }, 500);
                    } else {
                        apiStatus.textContent = `提交失败：${result.message || '未知错误'}`;
                        apiStatus.className = 'status-error';
                    }
                } else {
                    // 尝试解析错误响应
                    try {
                        const errorResult = await response.json();
                        apiStatus.textContent = `提交失败：${errorResult.detail || errorResult.message || `HTTP ${response.status}`}`;
                    } catch {
                        apiStatus.textContent = `网络错误：HTTP ${response.status}`;
                    }
                    apiStatus.className = 'status-error';
                }
            } catch (error) {
                apiStatus.textContent = `请求失败：${error.message}`;
                apiStatus.className = 'status-error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>提交步数</span>';
            }
        }
        
        // 表单提交事件
        document.getElementById('step-form').addEventListener('submit', submitSteps);
        
        // 页面加载完成时更新显示
        updateStepsDisplay();
        
        // 添加键盘快捷键
        document.addEventListener('keydown', function(event) {
            // Ctrl+Enter 提交表单
            if (event.ctrlKey && event.key === 'Enter') {
                document.getElementById('step-form').requestSubmit();
            }
            
            // Esc 重置步数为默认值
            if (event.key === 'Escape') {
                if (confirm('确定要重置步数为默认值吗？')) {
                    stepsInput.value = 52100;
                    stepsRange.value = 52100;
                    updateStepsDisplay();
                }
            }
            
            // +/- 键调整步数
            if (event.key === '+' || event.key === '=') {
                event.preventDefault();
                let current = parseInt(stepsInput.value);
                if (current < 100000) {
                    stepsInput.value = Math.min(current + 1000, 100000);
                    stepsRange.value = stepsInput.value;
                    updateStepsDisplay();
                }
            }
            
            if (event.key === '-' || event.key === '_') {
                event.preventDefault();
                let current = parseInt(stepsInput.value);
                if (current > 0) {
                    stepsInput.value = Math.max(current - 1000, 0);
                    stepsRange.value = stepsInput.value;
                    updateStepsDisplay();
                }
            }
        });
        
        // 初始化滑块背景
        window.addEventListener('load', function() {
            updateStepsDisplay();
        });
    </script>
</body>
</html>
